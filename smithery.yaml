# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    properties:
      huggingfaceApiKey:
        type: string
        description: Hugging Face API key for inference
      knowledgeBasesRootDir:
        type: string
        default: /root/knowledge_bases
        description: Root directory for knowledge bases
      faissIndexPath:
        type: string
        default: /root/knowledge_bases/.faiss
        description: Path to FAISS index file
      huggingfaceModelName:
        type: string
        default: sentence-transformers/all-MiniLM-L6-v2
        description: Hugging Face model for embeddings
      huggingfaceProvider:
        type: string
        default: hf-inference
        description: Hugging Face Inference Provider to use when routing through the HF router (examples: hf-inference, together, replicate, fireworks-ai, sambanova)
      embeddingProvider:
        type: string
        enum: ["huggingface", "ollama", "openai"]
        default: huggingface
        description: Embedding provider to use (huggingface, ollama, or openai)
      ollamaBaseUrl:
        type: string
        default: http://localhost:11434
        description: Base URL for the Ollama API
      ollamaModel:
        type: string
        default: dengcao/Qwen3-Embedding-0.6B:Q8_0
        description: Ollama model to use for embeddings
      openaiApiKey:
        type: string
        description: OpenAI API key for embeddings
      openaiModelName:
        type: string
        default: text-embedding-ada-002
        description: OpenAI model to use for embeddings
      mcpTransport:
        type: string
        enum: ["stdio", "sse"]
        default: stdio
        description: MCP transport — "stdio" (default) or "sse" (RFC 008 stage 1, opt-in HTTP/SSE endpoint).
      mcpPort:
        type: integer
        minimum: 1
        maximum: 65535
        default: 8765
        description: TCP port for the SSE listener. Ignored when mcpTransport=stdio.
      mcpBindAddr:
        type: string
        default: 127.0.0.1
        description: Bind address for the SSE listener. Defaults to loopback. Ignored when mcpTransport=stdio.
      mcpAuthToken:
        type: string
        description: Bearer token required by the SSE transport. REQUIRED when mcpTransport=sse. Ignored when mcpTransport=stdio. Generate with "openssl rand -base64 32".
      mcpAllowedOrigins:
        type: string
        description: Comma-separated list of allowed CORS origins for the SSE transport. Default empty = no browser origins allowed. Wildcard "*" is rejected.
    required:
      - knowledgeBasesRootDir
      - faissIndexPath
      - embeddingProvider
    oneOf:
      - properties:
          embeddingProvider:
            const: huggingface
        required:
          - huggingfaceApiKey
          - huggingfaceModelName
      - properties:
          embeddingProvider:
            const: ollama
        required:
          - ollamaBaseUrl
          - ollamaModel
      - properties:
          embeddingProvider:
            const: openai
        required:
          - openaiApiKey
    default: {}
  commandFunction:
    # A JS function that produces the CLI command based on the given config to start the MCP on stdio.
    |-
    (config) => ({
      command: 'node',
      args: ['build/index.js'],
      env: {
        HUGGINGFACE_API_KEY: config.huggingfaceApiKey,
        KNOWLEDGE_BASES_ROOT_DIR: config.knowledgeBasesRootDir,
        FAISS_INDEX_PATH: config.faissIndexPath,
        HUGGINGFACE_MODEL_NAME: config.huggingfaceModelName,
        HUGGINGFACE_PROVIDER: config.huggingfaceProvider,
        EMBEDDING_PROVIDER: config.embeddingProvider,
        OLLAMA_BASE_URL: config.ollamaBaseUrl,
        OLLAMA_MODEL: config.ollamaModel,
        OPENAI_API_KEY: config.openaiApiKey,
        OPENAI_MODEL_NAME: config.openaiModelName,
        MCP_TRANSPORT: config.mcpTransport,
        MCP_PORT: config.mcpPort != null ? String(config.mcpPort) : undefined,
        MCP_BIND_ADDR: config.mcpBindAddr,
        MCP_AUTH_TOKEN: config.mcpAuthToken,
        MCP_ALLOWED_ORIGINS: config.mcpAllowedOrigins
      }
    })
  exampleConfig:
    huggingfaceApiKey: hf_example_key_123
    knowledgeBasesRootDir: /data/knowledge_bases
    faissIndexPath: /data/knowledge_bases/.faiss
    huggingfaceModelName: sentence-transformers/all-MiniLM-L6-v2
    huggingfaceProvider: hf-inference
    embeddingProvider: huggingface
    ollamaBaseUrl: http://localhost:11434
    ollamaModel: dengcao/Qwen3-Embedding-0.6B:Q8_0
    openaiApiKey: sk-example_key_123
    openaiModelName: text-embedding-ada-002
