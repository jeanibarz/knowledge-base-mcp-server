name: Feature request
description: Suggest an idea for this project
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: textarea
    id: what
    attributes:
      label: What
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: where
    attributes:
      label: Where (file:line)
      description: If the feature relates to an existing file or location, specify it.
      placeholder: "e.g. src/KnowledgeBaseServer.ts:15 or a URL"
  - type: textarea
    id: why
    attributes:
      label: Why
      description: Why this feature matters and what problem it solves.
    validations:
      required: true
  - type: textarea
    id: suggested-fix
    attributes:
      label: Suggested fix / Implementation idea
      description: If you have a proposed approach, describe it here.
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Any other context or alternatives you've considered.
