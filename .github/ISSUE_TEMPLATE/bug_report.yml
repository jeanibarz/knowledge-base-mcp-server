name: Bug report
description: Create a report to help us improve
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: where
    attributes:
      label: Where (file:line)
      description: The specific location where the bug occurs.
      placeholder: "e.g. src/index.ts:42 or a URL"
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why
      description: Why this bug matters and what impact it has.
    validations:
      required: true
  - type: textarea
    id: suggested-fix
    attributes:
      label: Suggested fix
      description: If you have an idea for how to fix it, describe it here.
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Steps to reproduce, environment details, or any other context.
      placeholder: |
        - OS: [e.g. Ubuntu 22.04]
        - Node version: [e.g. 20]
        - Package version: [e.g. 1.0.0]
