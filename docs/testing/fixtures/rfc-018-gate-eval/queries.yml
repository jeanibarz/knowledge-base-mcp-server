  # ===== prose — has-answer, standard =======================================
  - name: prose - contextual retrieval rationale
    kb: prose
    query: why does embedding a chunk with surrounding context help recall
    bucket: has-answer
    reference_answer: >-
      A chunk embedded in isolation loses the document context that
      disambiguates its pronouns and headings; prepending a short context
      preface restores the signal a query can match against.
    answer_sources: [prose/contextual-retrieval.md]
    candidates:
      - id: c1
        source: prose/contextual-retrieval.md
        content: >-
          When a chunk is embedded alone it loses the surrounding document,
          so pronoun-heavy or heading-referencing text drifts away from the
          queries that should match it; a short generated context preface
          restores that signal.
        dense_distance: 0.51
      - id: c2
        source: prose/retrieval-tradeoffs.md
        content: Dense retrieval is paraphrase-tolerant; lexical retrieval is exact-token.
        dense_distance: 0.74
      - id: c3
        source: prose/onboarding-notes.md
        content: New contributors start by reading the architecture overview.
        dense_distance: 1.15

  - name: prose - context rot narrative
    kb: prose
    query: what happens to answer quality when too much context is injected
    bucket: has-answer
    task_context: >-
      Writing a design note arguing for a context budget; need the prior
      finding on how injected volume affects answer quality.
    reference_answer: >-
      Past a point, adding more retrieved context degrades answer quality —
      the model anchors on near-miss material and loses the thread; the team
      calls this context rot.
    answer_sources: [prose/context-rot.md]
    candidates:
      - id: c1
        source: prose/context-rot.md
        content: >-
          Beyond a certain volume, extra retrieved context stops helping and
          starts hurting: the model anchors on plausible-looking near-misses
          and drifts. The team's shorthand for this is context rot.
        dense_distance: 0.46
      - id: c2
        source: prose/retrieval-tradeoffs.md
        content: A noisier candidate set sometimes matches a precise one on final quality.
        dense_distance: 0.68
      - id: c3
        source: prose/llm-judge-reliability.md
        content: LLM graders agree with humans only moderately on nuanced answers.
        dense_distance: 0.95

  - name: prose - llm-as-judge agreement caveat
    kb: prose
    query: how much should we trust an LLM grader
    bucket: has-answer
    reference_answer: >-
      An LLM grader's human agreement must be measured before its verdicts
      are trusted; near the documented noise floor it cannot resolve small
      effects.
    answer_sources: [prose/llm-judge-reliability.md]
    candidates:
      - id: c1
        source: prose/llm-judge-reliability.md
        content: >-
          Before trusting an LLM grader, measure its agreement with human
          labels; a grader near the noise floor cannot resolve a small
          effect and disqualifies the comparison.
        dense_distance: 0.53
      - id: c2
        source: prose/context-rot.md
        content: Injected near-misses make a model drift off-task.
        dense_distance: 0.86

  # ===== prose — has-answer, answer-present-but-distant =====================
  - name: prose - reranker note phrased as a question about ordering
    kb: prose
    query: make the best result show up first
    bucket: has-answer
    fixture_class: answer-present-but-distant
    reference_answer: >-
      A cross-encoder reranker scores each candidate against the query
      directly and reorders them, giving a calibrated relevance score the
      fused rank lacks.
    answer_sources: [prose/cross-encoder-reranker.md]
    candidates:
      # The true answer chunk is distant from the loosely phrased query.
      - id: c1
        source: prose/cross-encoder-reranker.md
        content: >-
          A cross-encoder reranker re-scores each candidate jointly with the
          query, producing a calibrated relevance score and a reordering the
          rank-based fusion cannot give.
        dense_distance: 1.07
      - id: c2
        source: prose/retrieval-tradeoffs.md
        content: Rank-based fusion scores are uninformative as absolute relevance.
        dense_distance: 1.02
      - id: c3
        source: prose/contextual-retrieval.md
        content: Context prefaces help recall, not ordering.
        dense_distance: 1.08

