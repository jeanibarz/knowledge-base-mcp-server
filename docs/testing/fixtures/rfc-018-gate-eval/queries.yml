  # A no-good-answer query that nonetheless has a strong lexical hit — the
  # RFC 018 §6 BM25 veto blocks the empty verdict here, so the gate keeps
  # the (still irrelevant) best candidate flagged low-confidence.
  - name: prose - no answer but a lexical decoy matches
    kb: prose
    query: reranker latency budget for the judge call
    bucket: no-good-answer
    reference_answer: >-
      These notes describe what a reranker is but contain nothing about a
      latency budget for a judge call; they cannot answer this.
    candidates:
      - id: c1
        source: prose/cross-encoder-reranker.md
        content: >-
          A cross-encoder reranker re-scores candidates jointly with the
          query. (Shares the terms "reranker" and "judge" with the query but
          says nothing about a latency budget.)
        dense_distance: 1.02
        lexical_hit: true
      - id: c2
        source: prose/context-rot.md
        content: Context rot describes answer-quality decay under volume.
        dense_distance: 1.07
