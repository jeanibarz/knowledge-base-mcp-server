      - id: c2
        source: codeops/atomic-faiss-save.md
        content: Saves swap a versioned directory symlink atomically.
        dense_distance: 1.07
      - id: c3
        source: codeops/doctor-health.md
        content: kb doctor aggregates model and index health.
        dense_distance: 1.09

  - name: codeops - question the KB cannot answer (billing)
    kb: codeops
    query: what is the monthly cost of the hosted retrieval tier
    bucket: no-good-answer
    reference_answer: >-
      The knowledge base contains no pricing or billing information; it cannot
      answer this.
    candidates:
      - id: c1
        source: codeops/faiss-store-layout.md
        content: The store keeps docstore.json beside the index binary.
